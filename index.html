<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px 12px;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 400px;
            width: 100%;
            background-color: #121212;
            border-radius: 32px;
            padding: 24px 20px 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header-title {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: #f5f5f5;
        }
        .header-title span {
            color: #2b6ff2;
        }

        .header-avatar {
            width: 36px;
            height: 36px;
            background-color: #2b6ff2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        .header-avatar:active {
            background-color: #1f5ad8;
        }

        /* Balance */
        .balance-section {
            margin-bottom: 28px;
        }

        .balance-label {
            font-size: 14px;
            font-weight: 500;
            color: #8a8a8a;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .balance-main {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
            line-height: 1.1;
        }

        .balance-currency {
            font-size: 20px;
            font-weight: 500;
            color: #8a8a8a;
        }

        .balance-usd {
            font-size: 16px;
            font-weight: 400;
            color: #6a6a6a;
            margin-top: 4px;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            text-align: center;
            letter-spacing: 0.2px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background-color: #2b6ff2;
            color: #ffffff;
        }
        .btn-primary:hover {
            background-color: #3a7cf5;
        }
        .btn-primary:active {
            background-color: #1f5ad8;
        }

        .btn-secondary {
            background-color: #1e1e1e;
            border: 1px solid #2e2e2e;
            color: #f0f0f0;
        }
        .btn-secondary:hover {
            background-color: #2a2a2a;
        }
        .btn-secondary:active {
            background-color: #3a3a3a;
        }

        /* Address */
        .address-section {
            background-color: #1a1a1a;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #282828;
        }

        .address-label {
            font-size: 12px;
            font-weight: 500;
            color: #6a6a6a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 12px;
        }

        .address-value {
            font-family: 'Inter', monospace;
            font-size: 14px;
            font-weight: 400;
            color: #d0d0d0;
            letter-spacing: 0.2px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .address-copy {
            color: #6a6a6a;
            font-size: 18px;
            font-weight: 300;
            cursor: pointer;
            padding-left: 12px;
            border-left: 1px solid #2e2e2e;
            transition: color 0.15s;
            user-select: none;
        }
        .address-copy:hover {
            color: #b0b0b0;
        }
        .address-copy:active {
            color: #ffffff;
        }

        /* Transactions */
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .transactions-title {
            font-size: 16px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .transactions-see-all {
            font-size: 14px;
            font-weight: 500;
            color: #6a6a6a;
            cursor: pointer;
            transition: color 0.15s;
        }
        .transactions-see-all:hover {
            color: #b0b0b0;
        }
        .transactions-see-all:active {
            color: #ffffff;
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 160px;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1c1c1c;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 300;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .tx-icon.in {
            background-color: rgba(0, 200, 100, 0.12);
            color: #00c864;
        }

        .tx-icon.out {
            background-color: rgba(255, 80, 80, 0.12);
            color: #ff5a5a;
        }

        .tx-details {
            flex: 1;
            min-width: 0;
        }

        .tx-title {
            font-size: 15px;
            font-weight: 500;
            color: #f0f0f0;
            margin-bottom: 2px;
        }

        .tx-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #6a6a6a;
        }

        .tx-meta .status {
            color: #00c864;
            font-weight: 500;
        }

        .tx-meta .status.pending {
            color: #f0a030;
        }

        .tx-amount {
            font-weight: 600;
            font-size: 15px;
            text-align: right;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .tx-amount.positive {
            color: #00c864;
        }

        .tx-amount.negative {
            color: #ff5a5a;
        }

        /* Empty state */
        .empty-transactions {
            color: #4a4a4a;
            text-align: center;
            font-size: 14px;
            padding: 20px 0;
            letter-spacing: 0.3px;
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #1c1c1c;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            color: #5a5a5a;
            cursor: pointer;
            gap: 4px;
            transition: color 0.15s;
            padding: 4px 12px;
            border-radius: 8px;
            background: transparent;
            border: none;
            font-family: inherit;
        }
        .nav-item:hover {
            color: #8a8a8a;
        }
        .nav-item:active {
            color: #ffffff;
        }

        .nav-item.active {
            color: #2b6ff2;
        }

        .nav-icon {
            font-size: 20px;
            line-height: 1;
            font-weight: 300;
        }

        .nav-label {
            font-size: 10px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* Dev menu overlay */
        .dev-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 32px;
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 24px;
            flex-direction: column;
            gap: 16px;
        }

        .dev-overlay.open {
            display: flex;
        }

        .dev-title {
            font-size: 18px;
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .dev-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #2e2e2e;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border 0.15s;
        }
        .dev-input:focus {
            border-color: #2b6ff2;
        }
        .dev-input::placeholder {
            color: #5a5a5a;
            font-weight: 400;
            font-size: 16px;
        }

        .dev-actions {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .dev-btn {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            font-family: 'Inter', sans-serif;
        }
        .dev-btn:active {
            transform: scale(0.96);
        }

        .dev-btn-primary {
            background-color: #2b6ff2;
            color: #ffffff;
        }
        .dev-btn-primary:hover {
            background-color: #3a7cf5;
        }
        .dev-btn-primary:active {
            background-color: #1f5ad8;
        }

        .dev-btn-secondary {
            background-color: #2a2a2a;
            color: #b0b0b0;
        }
        .dev-btn-secondary:hover {
            background-color: #3a3a3a;
        }
        .dev-btn-secondary:active {
            background-color: #4a4a4a;
        }

        .dev-hint {
            font-size: 12px;
            color: #5a5a5a;
            text-align: center;
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 440px) {
            .app {
                padding: 20px 16px 12px;
                border-radius: 24px;
            }
            .balance-amount {
                font-size: 32px;
            }
            .balance-currency {
                font-size: 18px;
            }
            .dev-overlay {
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="app no-select" id="app">

        <!-- Header -->
        <div class="header">
            <span class="header-title">Nova<span>Pay</span></span>
            <div class="header-avatar" onclick="alert('Профиль NovaPay')">N</div>
        </div>

        <!-- Balance -->
        <div class="balance-section">
            <div class="balance-label">Total Balance</div>
            <div class="balance-main">
                <span class="balance-amount" id="balanceAmount">0.00000000</span>
                <span class="balance-currency">BTC</span>
            </div>
            <div class="balance-usd" id="balanceUsd">≈ 0.00 USD</div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <div class="btn btn-primary" onclick="alert('Форма отправки (демо)')">Send</div>
            <div class="btn btn-secondary" onclick="alert('Показать адрес для получения (демо)')">Receive</div>
        </div>

        <!-- Address -->
        <div class="address-section">
            <span class="address-label">Address</span>
            <span class="address-value">1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa</span>
            <span class="address-copy" onclick="alert('Адрес скопирован (демо)')">⏍</span>
        </div>

        <!-- Transactions -->
        <div class="transactions-header">
            <span class="transactions-title">Recent Transactions</span>
            <span class="transactions-see-all" onclick="alert('Полная история (демо)')">See all</span>
        </div>

        <div class="transaction-list" id="transactionList">
            <div class="empty-transactions">No transactions yet</div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="alert('Главная')">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" onclick="alert('История транзакций')">
                <span class="nav-icon">≡</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-item" id="settingsBtn">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">Settings</span>
            </button>
        </div>

        <!-- Developer Menu Overlay -->
        <div class="dev-overlay" id="devOverlay">
            <div class="dev-title">Developer Tools</div>
            <input type="number" id="devAmount" class="dev-input" placeholder="Enter BTC amount" step="0.00000001" min="0">
            <div class="dev-actions">
                <button class="dev-btn dev-btn-primary" id="devAddBtn">Add funds</button>
                <button class="dev-btn dev-btn-secondary" id="devCloseBtn">Close</button>
            </div>
            <div class="dev-hint">(demo: adds to balance & history)</div>
        </div>

    </div>

    <script>
        (function() {
            // State
            let balance = 0; // in BTC
            let transactions = []; // array of objects
            let clickCount = 0;
            const BTC_USD_RATE = 68000;

            // DOM refs
            const balanceAmount = document.getElementById('balanceAmount');
            const balanceUsd = document.getElementById('balanceUsd');
            const transactionList = document.getElementById('transactionList');
            const settingsBtn = document.getElementById('settingsBtn');
            const devOverlay = document.getElementById('devOverlay');
            const devAmount = document.getElementById('devAmount');
            const devAddBtn = document.getElementById('devAddBtn');
            const devCloseBtn = document.getElementById('devCloseBtn');

            // Render UI
            function render() {
                // Balance
                balanceAmount.textContent = balance.toFixed(8);
                const usd = balance * BTC_USD_RATE;
                balanceUsd.textContent = `≈ ${usd.toFixed(2)} USD`;

                // Transactions
                if (transactions.length === 0) {
                    transactionList.innerHTML = `<div class="empty-transactions">No transactions yet</div>`;
                    return;
                }

                let html = '';
                for (let i = 0; i < transactions.length; i++) {
                    const tx = transactions[i];
                    const isIn = tx.type === 'received';
                    const icon = isIn ? '↓' : '↑';
                    const iconClass = isIn ? 'in' : 'out';
                    const amountClass = isIn ? 'positive' : 'negative';
                    const sign = isIn ? '+' : '-';
                    const title = isIn ? 'Received' : 'Sent';

                    html += `
                        <div class="transaction-item">
                            <div class="tx-icon ${iconClass}">${icon}</div>
                            <div class="tx-details">
                                <div class="tx-title">${title}</div>
                                <div class="tx-meta">
                                    <span>${tx.date}</span>
                                    <span class="status">${tx.status}</span>
                                </div>
                            </div>
                            <div class="tx-amount ${amountClass}">${sign} ${tx.amount.toFixed(8)} BTC</div>
                        </div>
                    `;
                }
                transactionList.innerHTML = html;
            }

            // Add transaction
            function addTransaction(amount, type = 'received', status = 'Confirmed') {
                const now = new Date();
                const dateStr = now.toLocaleString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                transactions.unshift({
                    amount: amount,
                    type: type,
                    status: status,
                    date: dateStr
                });
                render();
            }

            // Add funds (developer)
            function addFunds(amount) {
                if (isNaN(amount) || amount <= 0) {
                    alert('Please enter a valid positive amount.');
                    return false;
                }
                balance += amount;
                addTransaction(amount, 'received', 'Confirmed');
                render();
                return true;
            }

            // Dev menu
            function openDevMenu() {
                devOverlay.classList.add('open');
                devAmount.value = '';
                devAmount.focus();
            }

            function closeDevMenu() {
                devOverlay.classList.remove('open');
            }

            // Settings click handler (count to 10)
            settingsBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                clickCount++;
                if (clickCount >= 10) {
                    clickCount = 0;
                    openDevMenu();
                }
            });

            // Dev add button
            devAddBtn.addEventListener('click', function() {
                const raw = devAmount.value.trim();
                const amount = parseFloat(raw);
                if (addFunds(amount)) {
                    closeDevMenu();
                }
            });

            // Dev close button
            devCloseBtn.addEventListener('click', closeDevMenu);

            // Close on overlay click (background)
            devOverlay.addEventListener('click', function(e) {
                if (e.target === devOverlay) {
                    closeDevMenu();
                }
            });

            // Enter key on input
            devAmount.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    devAddBtn.click();
                }
            });

            // Initial render
            render();

            // Also handle "See all" and other buttons as demo
            // Already have inline onclick

            // Prevent context menu on long press (mobile)
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            // For demonstration, we could also prefill some data? No, start empty.
            // Optionally, we could add a welcome transaction? No, keep empty.

            console.log('NovaPay ready. Click Settings 10x for dev menu.');
        })();
    </script>
</body>
</html>
