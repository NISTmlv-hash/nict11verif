<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nict11</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            padding: 50px 40px;
            border-radius: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .username {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .handle {
            font-size: 1.1rem;
            color: #9aa0b0;
            margin-bottom: 30px;
            display: block;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 20px;
        }
        .bio {
            color: #c8ced8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .mastodon-link {
            display: inline-block;
            background: #6364ff;
            color: #fff;
            padding: 14px 34px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 8px 24px rgba(99,100,255,0.25);
        }
        .mastodon-link:hover {
            background: #7a7bff;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #3a3f4a;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="username">nict11</div>
        <span class="handle">@nict11</span>
        <div class="bio">✦ просто человек ✦<br>иногда пишу код, иногда отдыхаю</div>
        <a href="https://mastodon.social/@nict11" rel="me" class="mastodon-link">🐘 Мой Mastodon</a>
        <div class="footer">верификация • 2026</div>
    </div>
</body>
</html>
